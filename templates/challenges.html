{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row mb-5 text-center">
        <div class="col-md-12">
            <h1 class="display-3 fw-bold drift-animation text-mario">Grand Prix Tracks</h1>
            <p class="lead text-muted">Select a track to begin the race!</p>
        </div>
    </div>

    <div x-data="ChallengeBoard" x-init="setup()">
        <div class="row mb-4">
            <div class="col-md-12 d-flex justify-content-center flex-wrap gap-2">
                <template x-for="category in categories" :key="category">
                    <button class="btn btn-outline-light rounded-pill px-4" 
                            :class="{'active btn-mario': selectedCategory === category}"
                            @click="selectedCategory = category"
                            x-text="category"></button>
                </template>
            </div>
        </div>

        <div class="row">
            <template x-for="challenge in filteredChallenges" :key="challenge.id">
                <div class="col-md-4 mb-4">
                    <div class="challenge-card h-100 p-0" @click="openChallenge(challenge)">
                        <div class="challenge-header" :style="{ backgroundColor: getChallengeColor(challenge) }">
                            <span x-text="challenge.category" class="small text-uppercase"></span>
                        </div>
                        <div class="challenge-body text-center py-4">
                            <h4 x-text="challenge.name" class="mb-3"></h4>
                            <div class="h5 mb-4">
                                <span x-text="challenge.value"></span> CC
                            </div>
                            <div class="item-box mushroom" :class="getChallengeIcon(challenge)"></div>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ Assets.js("assets/js/challenges.js") }}
<script>
    document.addEventListener('alpine:init', () => {
        window.Alpine.data('ChallengeBoard', () => ({
            challenges: [],
            categories: [],
            selectedCategory: 'All',
            async setup() {
                try {
                    const response = await window.CTFd.fetch('/api/v1/challenges');
                    const data = await response.json();
                    
                    if (data && data.success && Array.isArray(data.data)) {
                        this.challenges = data.data.map(c => {
                            let difficulty = 'easy';
                            if (c.value >= 300) difficulty = 'hard';
                            else if (c.value >= 150) difficulty = 'medium';
                            
                            return {
                                id: c.id,
                                name: c.name,
                                category: c.category,
                                value: c.value,
                                difficulty: difficulty
                            };
                        });
                        this.categories = ['All', ...new Set(this.challenges.map(c => c.category))];
                    }
                } catch (error) {
                    console.error("Failed to load challenges from CTFd API:", error);
                    // Silently fail or use empty arrays, allowing Alpine template to render skeleton
                }
            },
            get filteredChallenges() {
                if (this.selectedCategory === 'All') return this.challenges;
                return this.challenges.filter(c => c.category === this.selectedCategory);
            },
            getChallengeColor(c) {
                const colors = { easy: '#43B02A', medium: '#009FD9', hard: '#E60012' };
                return colors[c.difficulty] || '#F58220';
            },
            getChallengeIcon(c) {
                if (c.difficulty === 'easy') return 'mushroom';
                if (c.difficulty === 'medium') return 'shell';
                return 'star';
            },
            openChallenge(c) {
                // In CTFd v3, challenges usually open a modal or use window.location
                window.location.href = `/challenges#${c.name}-${c.id}`;
            }
        }));
    });
</script>
{% endblock %}

{% block stylesheets %}
<style>
    .text-mario { color: #E60012; }
    .btn-mario { background-color: #E60012; color: white; border: none; }
    .btn-mario:hover { background-color: #ff0000; }
</style>
{% endblock %}
