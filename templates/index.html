{% extends "base.html" %}

{% block content %}
<section class="hero text-center pt-5">
    <div class="container py-5">
        <div class="hero__badge-row">
            <span class="race-chip"><span class="item-box item-box--sm mushroom"></span> Mushroom Cup Boost</span>
            <span class="race-chip"><span class="item-box item-box--sm flower"></span> Flower Cup Drift</span>
            <span class="race-chip"><span class="item-box item-box--sm star"></span> Star Cup Finish</span>
        </div>
        <h1 class="display-1 fw-bold mb-4 drift-animation">Start Your Engines!</h1>
        <p class="lead mb-4">Welcome to {{ Configs.ctf_name }}. Ready to take the checkered flag?</p>
        <div class="hero__actions">
            <a href="{{ url_for('challenges.listing') }}" class="btn btn-mario btn-lg px-5 text-white">Join the Race</a>
            <a href="{{ url_for('scoreboard.listing') }}" class="btn btn-outline-luigi btn-lg px-5">View Podium</a>
        </div>
    </div>
</section>
{% endblock %}
