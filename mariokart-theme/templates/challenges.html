{% extends "base.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <section class="race-panel">
        <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-end gap-4 mb-4">
            <div>
                <p class="section-kicker"><i class="fas fa-road"></i> Cup Select</p>
                <h1 class="display-3 fw-bold drift-animation text-mario mb-3">Grand Prix Tracks</h1>
                <p class="lead text-muted mb-0">Every challenge category keeps its original name while getting its own Grand Prix lane styling.</p>
            </div>
            <div class="race-chip"><span class="item-box item-box--sm flower"></span> Category lanes become cups</div>
        </div>

        <div x-data="ChallengeBoard" x-init="setup()">
            <div id="challenge-window" class="modal fade" tabindex="-1" role="dialog" aria-hidden="true"></div>

            <div class="cup-selector-grid mb-4">
                <button class="cup-selector" :class="{'is-active': selectedCategory === 'All'}" @click="selectedCategory = 'All'">
                    <span class="cup-selector__eyebrow">All Categories</span>
                    <span class="cup-selector__title">Grand Prix</span>
                    <span class="cup-selector__meta">
                        <span><i class="fas fa-layer-group"></i> All categories</span>
                        <span x-text="`${challenges.length} tracks`"></span>
                    </span>
                </button>

                <template x-for="category in categories" :key="category.category">
                    <button
                        class="cup-selector"
                        :class="{'is-active': selectedCategory === category.category}"
                        :style="{ '--cup-accent': category.accent }"
                        @click="selectedCategory = category.category"
                    >
                        <span class="cup-selector__eyebrow" x-text="category.cup"></span>
                        <span class="cup-selector__title" x-text="category.category"></span>
                        <span class="cup-selector__meta">
                            <span><span class="item-box item-box--sm" :class="category.item"></span></span>
                            <span x-text="category.badge"></span>
                        </span>
                    </button>
                </template>
            </div>

            <template x-if="visibleCupGroups.length === 0">
                <div class="challenge-empty race-panel">
                    No tracks are available for this cup yet.
                </div>
            </template>

            <template x-for="group in visibleCupGroups" :key="group.category">
                <section class="race-panel cup-panel" :style="{ '--cup-accent': group.accent, '--cup-soft': group.soft }">
                    <div class="cup-panel__header">
                        <div class="cup-emblem">
                            <span class="item-box item-box--lg" :class="group.item"></span>
                        </div>
                        <div>
                            <p class="section-kicker mb-2" x-text="group.cup"></p>
                            <h2 x-text="group.category + ' Circuit'"></h2>
                            <p x-text="group.description"></p>
                        </div>
                        <div class="cup-stat">
                            <span x-text="group.badge"></span><br>
                            <small x-text="`${group.challenges.length} tracks`"></small>
                        </div>
                    </div>

                    <div class="row g-4">
                        <template x-for="challenge in group.challenges" :key="challenge.id">
                            <div class="col-lg-6">
                                <article
                                    class="track-card"
                                    :style="{ '--cup-accent': group.accent }"
                                    role="button"
                                    tabindex="0"
                                    @click="openChallenge(challenge)"
                                    @keyup.enter.prevent="openChallenge(challenge)"
                                    @keyup.space.prevent="openChallenge(challenge)"
                                >
                                    <div class="track-card__lane"></div>
                                    <div>
                                        <div class="track-card__topline">
                                            <span class="track-number">Track <span x-text="challenge.trackNumber"></span></span>
                                            <span class="difficulty-chip" :class="`difficulty-chip--${challenge.difficulty}`" x-text="challenge.difficultyLabel"></span>
                                        </div>
                                        <h3 x-text="challenge.name"></h3>
                                        <p class="track-copy" x-text="challenge.blurb"></p>
                                        <div class="track-meta">
                                            <span><i class="fas fa-gauge-high"></i> <span x-text="challenge.value"></span> CC</span>
                                            <span><i class="fas fa-folder-open"></i> <span x-text="challenge.category"></span></span>
                                        </div>
                                    </div>
                                    <div class="track-card__item">
                                        <span class="item-box item-box--lg" :class="getChallengeIcon(challenge)"></span>
                                    </div>
                                </article>
                            </div>
                        </template>
                    </div>
                </section>
            </template>
        </div>
    </section>
</div>
{% endblock %}

{% block scripts %}
{{ Assets.js("assets/js/challenges.js") }}
<script>
    document.addEventListener('alpine:init', () => {
        const cupThemes = [
            {
                accent: '#ff5b43',
                soft: '#ffe1d8',
                item: 'mushroom',
                badge: 'Warm-up Circuit',
                description: 'Quick opening laps with approachable corners and plenty of room to accelerate.'
            },
            {
                accent: '#ff7ca8',
                soft: '#ffe4ef',
                item: 'flower',
                badge: 'Technical Bloom',
                description: 'Tighter lines, sharper turns, and more floral precision between checkpoints.'
            },
            {
                accent: '#1fa7ff',
                soft: '#dff2ff',
                item: 'star',
                badge: 'Cosmic Sprint',
                description: 'High-speed tracks for the teams climbing the leaderboard in the late race.'
            },
            {
                accent: '#6f61ff',
                soft: '#e3e0ff',
                item: 'star',
                badge: 'Final Lap',
                description: 'Chaos-mode circuits with the toughest hazards and the biggest point swings.'
            },
            {
                accent: '#43b02a',
                soft: '#e2f7d8',
                item: 'shell',
                badge: 'Defensive Lines',
                description: 'Measured tracks built around careful spacing, trap avoidance, and steady momentum.'
            },
            {
                accent: '#ffcb33',
                soft: '#fff4cc',
                item: 'mushroom',
                badge: 'Shortcut Charge',
                description: 'Fast lanes and risky shortcuts reward the teams willing to cut tighter corners.'
            },
            {
                accent: '#78c96b',
                soft: '#e8f8e2',
                item: 'flower',
                badge: 'Forest Drift',
                description: 'Longer technical sections put precision, patience, and route discipline first.'
            },
            {
                accent: '#2c9fff',
                soft: '#dff1ff',
                item: 'star',
                badge: 'Storm Pace',
                description: 'High-voltage circuits where the leaderboard can shift quickly in a single lap.'
            },
            {
                accent: '#ff9a5c',
                soft: '#ffe9dd',
                item: 'mushroom',
                badge: 'Launch Start',
                description: 'Balanced tracks with room to recover, re-route, and keep the race competitive.'
            },
            {
                accent: '#2bc6a4',
                soft: '#ddfaf2',
                item: 'flower',
                badge: 'Town Tour',
                description: 'Mixed-terrain circuits that reward flexible play and smart transitions.'
            },
            {
                accent: '#8668ff',
                soft: '#ebe5ff',
                item: 'star',
                badge: 'Final Chime',
                description: 'Late-event cups tuned for teams trying to close out the Grand Prix in style.'
            },
            {
                accent: '#507dff',
                soft: '#e4ebff',
                item: 'star',
                badge: 'Night Run',
                description: 'Extended circuits with cooler tones, longer arcs, and more deliberate pacing.'
            }
        ];

        const fallbackThemes = [
            {
                accent: '#ff6f61',
                soft: '#ffe5e1',
                item: 'mushroom',
                badge: 'Wildcard Heat'
            },
            {
                accent: '#ff8fcb',
                soft: '#ffe8f6',
                item: 'flower',
                badge: 'Wildcard Bloom'
            },
            {
                accent: '#49b1ff',
                soft: '#e3f4ff',
                item: 'star',
                badge: 'Wildcard Sprint'
            },
            {
                accent: '#57c96e',
                soft: '#e4f9e8',
                item: 'shell',
                badge: 'Wildcard Guard'
            }
        ];

        function getCupTheme(index, category) {
            if (cupThemes[index]) {
                return {
                    cup: category,
                    ...cupThemes[index]
                };
            }

            const fallback = fallbackThemes[(index - cupThemes.length) % fallbackThemes.length];
            return {
                cup: category,
                accent: fallback.accent,
                soft: fallback.soft,
                item: fallback.item,
                badge: fallback.badge,
                description: `${category} keeps its original category name while getting a generated lane style on the Grand Prix board.`
            };
        }

        window.Alpine.data('ChallengeBoard', () => ({
            challenges: [],
            categories: [],
            categoryLookup: {},
            selectedCategory: 'All',
            async setup() {
                try {
                    const response = await window.CTFd.fetch('/api/v1/challenges');
                    const data = await response.json();

                    if (data && data.success && Array.isArray(data.data)) {
                        const uniqueCategories = [...new Set(data.data.map(challenge => challenge.category))].sort();
                        this.categories = uniqueCategories.map((category, index) => {
                            const theme = getCupTheme(index, category);
                            return {
                                category,
                                ...theme
                            };
                        });

                        this.categoryLookup = this.categories.reduce((lookup, category) => {
                            lookup[category.category] = category;
                            return lookup;
                        }, {});

                        const trackCounts = {};

                        this.challenges = data.data.map(challenge => {
                            const cup = this.categoryLookup[challenge.category] || getCupTheme(0, challenge.category);
                            let difficulty = 'easy';
                            let difficultyLabel = '50cc';

                            if (challenge.value >= 500) {
                                difficulty = 'expert';
                                difficultyLabel = 'Mirror';
                            } else if (challenge.value >= 300) {
                                difficulty = 'hard';
                                difficultyLabel = '150cc';
                            } else if (challenge.value >= 150) {
                                difficulty = 'medium';
                                difficultyLabel = '100cc';
                            }

                            trackCounts[challenge.category] = (trackCounts[challenge.category] || 0) + 1;

                            return {
                                id: challenge.id,
                                name: challenge.name,
                                category: challenge.category,
                                value: challenge.value,
                                difficulty,
                                difficultyLabel,
                                trackNumber: trackCounts[challenge.category],
                                blurb: this.getTrackBlurb(challenge, difficulty)
                            };
                        });
                    }
                } catch (error) {
                    console.error("Failed to load challenges from CTFd API:", error);
                }
            },
            get visibleCupGroups() {
                return this.categories
                    .filter(category => this.selectedCategory === 'All' || this.selectedCategory === category.category)
                    .map(category => ({
                        ...category,
                        challenges: this.challenges.filter(challenge => challenge.category === category.category)
                    }))
                    .filter(group => group.challenges.length > 0);
            },
            getTrackBlurb(challenge, difficulty) {
                const blurbs = {
                    easy: 'Warm up the tires and bank a clean early-race solve.',
                    medium: 'A tighter corner with stronger defenses around the apex.',
                    hard: 'A late-lap technical section where every move has to stick.',
                    expert: 'Mirror mode chaos with the highest stakes on the board.'
                };

                return `${blurbs[difficulty]} ${challenge.category} holds ${challenge.value} CC on this circuit.`;
            },
            getChallengeIcon(challenge) {
                if (challenge.difficulty === 'easy') return 'mushroom';
                if (challenge.difficulty === 'medium') return 'flower';
                return 'star';
            },
            async openChallenge(challenge) {
                if (window.MarioKartChallenges && typeof window.MarioKartChallenges.loadChallenge === 'function') {
                    await window.MarioKartChallenges.loadChallenge(challenge.id);
                    return;
                }

                window.location.href = `/challenges#${challenge.name}-${challenge.id}`;
            }
        }));
    });
</script>
{% endblock %}
