<div x-show="$store.ui.loading" 
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="opacity-0"
     x-transition:enter-end="opacity-100"
     x-transition:leave="transition ease-in duration-300"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="loading-overlay">
    <div class="text-center w-75">
        <h2 class="text-white mb-5 drift-animation" x-text="$store.ui.loadingMessage">Preparing the Race...</h2>
        <div class="loading-track mx-auto mb-4"></div>
        <div class="boost-container mx-auto" x-show="$store.ui.progress >= 0">
            <div class="boost-gauge" :style="{ width: $store.ui.progress + '%' }"></div>
        </div>
    </div>
</div>
